<!DOCTYPE html>
<html>
<head>
<title>SmartAid Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  text-align: center;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 15px;
  display: inline-block;
  margin-top: 40px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

input {
  margin: 10px;
  padding: 10px;
  width: 250px;
}

button {
  padding: 10px 25px;
  background: #2e7d32;
  color: white;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  font-size: 18px;
}

.list {
  margin-top: 30px;
  text-align: left;
}

.item {
  background: #eee;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="card">
  <h1>SmartAid Dashboard</h1>

  <form id="helpForm">
    <input id="name" type="text" placeholder="Your Name" required><br>
    <input id="location" type="text" placeholder="Location" required><br>
    <input id="type" type="text" placeholder="Type of Help" required><br>
    <button type="submit">Submit</button>
  </form>

  <div id="output" class="result"></div>

  <div class="list">
    <h3>Requests</h3>
    <div id="requests"></div>
  </div>
</div>

<script>

// 🔥 FAKE VOLUNTEER DATABASE
const volunteers = [
  {name: "Rahul", type: "medical"},
  {name: "Anita", type: "food"},
  {name: "John", type: "shelter"}
];

document.getElementById("helpForm").addEventListener("submit", function(e){
  e.preventDefault();

  let name = document.getElementById("name").value;
  let location = document.getElementById("location").value;
  let type = document.getElementById("type").value.toLowerCase();

  let priority = "";
  let volunteer = "No volunteer available";

  // 🔴 AI PRIORITY LOGIC
  if(type.includes("medical") || type.includes("emergency")){
    priority = "🔴 HIGH";
  }
  else if(type.includes("food") || type.includes("water")){
    priority = "🟡 MEDIUM";
  }
  else{
    priority = "🟢 LOW";
  }

  // 🤖 MATCH VOLUNTEER
  volunteers.forEach(v => {
    if(type.includes(v.type)){
      volunteer = v.name;
    }
  });

  // 💬 SMART RESPONSE
  document.getElementById("output").innerHTML = `
    <p><b>Request Submitted ✅</b></p>
    <p>Priority: ${priority}</p>
    <p>Assigned Volunteer: <b>${volunteer}</b></p>
  `;

  // 📦 STORE & DISPLAY REQUEST
  let requestHTML = `
    <div class="item">
      <b>${name}</b> - ${type} (${priority})<br>
      📍 ${location}<br>
      👤 ${volunteer}
    </div>
  `;

  document.getElementById("requests").innerHTML += requestHTML;

});
</script>

</body>
</html>
