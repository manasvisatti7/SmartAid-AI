<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartAid AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* Background */
.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(270deg, #c8e6c9, #a5d6a7, #81c784);
}

/* Card */
.card {
  background: white;
  padding: 50px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 {
  color: #2e7d32;
}

p {
  color: #555;
}

/* Button */
button {
  margin-top: 20px;
  padding: 12px 30px;
  border: none;
  border-radius: 30px;
  background: #2e7d32;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #1b5e20;
}
</style>

</head>

<body>

<div class="container">
  <div class="card">
    <h1>SmartAid AI</h1>
    <p>Connecting People in Need with the Right Help — Instantly</p>
    <button onclick="goToApp()">Get Started</button>
  </div>
</div>

<script>
function goToApp() {
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
